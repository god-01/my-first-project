<!DOCTYPE html>
<html>
<head>
    <title>Srushti | Portfolio</title>
  <style>
    body {
        font-family: Arial, sans-serif;
        background: #0f172a; /* DARK BLUE BACK */
        color: white;
        text-align: center; /* CENTER EVERYTHING */
        padding: 50px;
        margin: 0;
        animation: fadeIn 1s ease-in;
    }

    h1 {
        font-size: 40px;
    }

    p {
        font-size: 18px;
        color: #cbd5f5;
    }

    .box {
        background: #1e293b;
        padding: 20px;
        margin: 20px auto; /* THIS centers the box */
        width: 60%;
        border-radius: 10px;
        animation: fadeIn 1s ease-in;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .box:hover {
        transform: scale(1.05);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .btn {
        display: inline-block;
        margin-top: 10px;
        padding: 10px 20px;
        background: #3b82f6;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        transition: all 0.3s ease;
    }

    .btn:hover {
        background: #2563eb;
        transform: scale(1.1);
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
      .typing {
    overflow: hidden;
    border-right: 3px solid white;
    white-space: nowrap;
    width: 0;
    margin: 0 auto;
    animation: typing 3s steps(30, end) forwards, blink 0.7s infinite;
}

@keyframes typing {
    from { width: 0 }
    to { width: 100% }
}

@keyframes blink {
    50% { border-color: transparent }
}
</style>
</head>

<body>

  <h1 class="typing">Hi, I'm Srushti 👋</h1>
    <p>Aspiring Web Developer & Entrepreneur</p>

    <div class="box">
        <h2>About Me</h2>
        <p>I’m learning web development and building projects to become freelance-ready.</p>
    </div>

    <div class="box">
        <h2>Skills</h2>
        <p>HTML | CSS | JavaScript (learning)</p>
    </div>

    <div class="box">
 <h2>Projects</h2>
<p>My First Website 🚀</p>
<a href="#" class="btn">View Project</a>
    </div>

    <div class="box">
        <h2>Contact</h2>
        <p>Email: srusam123456@gmail.com</p>
    </div>

</body>
</html>
