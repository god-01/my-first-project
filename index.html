<!DOCTYPE html>
<html>
<head>
<title>Srushti | Space Portfolio 👽</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: #e2e8f0;
    text-align: center;
    overflow-x: hidden;
}

/* ⭐ STARS (PURE CSS) */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background: transparent;
    box-shadow:
    100px 200px white,
    300px 400px white,
    500px 100px white,
    700px 300px white,
    900px 600px white,
    200px 800px white,
    400px 900px white,
    800px 700px white,
    1200px 500px white;
    animation: moveStars 50s linear infinite;
}

@keyframes moveStars {
    from { transform: translateY(0); }
    to { transform: translateY(-1000px); }
}

/* 👽 ALIEN */
.alien {
    position: fixed;
    bottom: 40px;
    left: -100px;
    font-size: 40px;
    animation: walkAlien 20s linear infinite;
}

@keyframes walkAlien {
    0% { left: -100px; }
    100% { left: 110%; }
}

/* 🛸 UFO */
.ufo {
    position: fixed;
    top: 60px;
    left: -150px;
    font-size: 50px;
    animation: flyUFO 12s linear infinite;
}

@keyframes flyUFO {
    0% { left: -150px; }
    100% { left: 110%; }
}

/* TEXT */
h1 {
    font-size: 42px;
    margin-top: 80px;
}

p {
    color: #94a3b8;
}

/* CARDS */
.box {
    background: rgba(15, 23, 42, 0.7);
    padding: 25px;
    margin: 60px auto;
    width: 60%;
    border-radius: 15px;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.05);
    transition: 0.3s;
}

.box:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 20px rgba(59,130,246,0.3);
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 12px 25px;
    background: #020617;
    color: #cbd5f5;
    text-decoration: none;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
}

/* SCROLL ANIMATION */
.hidden {
    opacity: 0;
    transform: translateY(60px);
}

.show {
    opacity: 1;
    transform: translateY(0);
    transition: 1s;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="alien">👽</div>
<div class="ufo">🛸</div>

<h1>Hi, I'm Srushti 👋</h1>
<p>Exploring the universe of Web Development 🚀</p>

<div class="box hidden">
<h2>About Me</h2>
<p>I’m building projects and learning to become freelance-ready.</p>
</div>

<div class="box hidden">
<h2>Skills</h2>
<p>HTML | CSS | JavaScript (learning)</p>
</div>

<div class="box hidden">
<h2>Projects</h2>
<p>My First Website 🚀</p>
<a href="#" class="btn">View Project</a>
</div>

<div class="box hidden">
<h2>Contact</h2>
<p>Email: srusam123456@gmail.com</p>
</div>

<script>
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add("show");
        }
    });
});

document.querySelectorAll(".hidden").forEach(el => observer.observe(el));
</script>

</body>
</html>
