<!DOCTYPE html>
<html>
<head>
    <title>Srushti | Space Portfolio 👽</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at bottom, #020617, #000000);
    color: #e2e8f0;
    text-align: center;
    overflow-x: hidden;
}

/* ⭐ STARS BACKGROUND */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    animation: moveStars 60s linear infinite;
    opacity: 0.2;
}

@keyframes moveStars {
    from { transform: translate(0,0); }
    to { transform: translate(-500px, -500px); }
}

/* 👽 ALIEN */
.alien {
    position: fixed;
    bottom: 50px;
    left: -100px;
    font-size: 40px;
    animation: walkAlien 20s linear infinite;
}

@keyframes walkAlien {
    0% { left: -100px; }
    100% { left: 110%; }
}

/* 🛸 UFO */
.ufo {
    position: fixed;
    top: 80px;
    left: -150px;
    font-size: 50px;
    animation: flyUFO 15s linear infinite;
}

@keyframes flyUFO {
    0% { left: -150px; transform: translateY(0); }
    50% { transform: translateY(40px); }
    100% { left: 110%; transform: translateY(0); }
}

/* TITLE */
h1 {
    font-size: 42px;
    margin-top: 80px;
}

/* TEXT */
p {
    color: #94a3b8;
}

/* CARDS */
.box {
    background: rgba(15, 23, 42, 0.6);
    padding: 25px;
    margin: 60px auto;
    width: 60%;
    border-radius: 15px;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.05);
    transition: all 0.3s ease;
}

/* HOVER GLOW */
.box:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 0 25px rgba(59,130,246,0.3);
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 12px 25px;
    background: #020617;
    color: #cbd5f5;
    text-decoration: none;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s;
}

.btn:hover {
    background: rgba(59,130,246,0.2);
    box-shadow: 0 0 15px rgba(59,130,246,0.4);
}

/* SCROLL ANIMATION */
.hidden {
    opacity: 0;
    transform: translateY(60px);
}

.show {
    opacity: 1;
    transform: translateY(0);
    transition: all 1s ease;
}
</style>
</head>

<body>

<!-- 👽 Alien -->
<div class="alien">👽</div>

<!-- 🛸 UFO -->
<div class="ufo">🛸</div>

<h1>Hi, I'm Srushti 👋</h1>
<p>Exploring the universe of Web Development 🚀</p>

<div class="box hidden">
    <h2>About Me</h2>
    <p>I’m building projects and learning to become freelance-ready.</p>
</div>

<div class="box hidden">
    <h2>Skills</h2>
    <p>HTML | CSS | JavaScript (learning)</p>
</div>

<div class="box hidden">
    <h2>Projects</h2>
    <p>My First Website 🚀</p>
    <a href="#" class="btn">View Project</a>
</div>

<div class="box hidden">
    <h2>Contact</h2>
    <p>Email: srusam123456@gmail.com</p>
</div>

<script>
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add("show");
        }
    });
}, {
    threshold: 0.2
});

document.querySelectorAll(".hidden").forEach(el => observer.observe(el));
</script>

</body>
</html>
