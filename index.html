<!DOCTYPE html>
<html>
<head>
<title>Srushti | Space Chaos 👽</title>

<style>
body {
    margin: 0;
    background: black;
    color: #e2e8f0;
    font-family: Arial;
    text-align: center;
    overflow: hidden;
}

/* STARS */
.star {
    position: fixed;
    width: 2px;
    height: 2px;
    background: white;
    opacity: 0.8;
}

/* MOVING OBJECTS */
.mover {
    position: fixed;
    font-size: 35px;
    z-index: 5;
    pointer-events: none;
}

/* CONTENT */
h1 {
    margin-top: 60px;
    font-size: 40px;
    position: relative;
    z-index: 10;
}

p {
    color: #94a3b8;
    position: relative;
    z-index: 10;
}

.box {
    background: rgba(15, 23, 42, 0.7);
    padding: 25px;
    margin: 40px auto;
    width: 60%;
    border-radius: 15px;
    position: relative;
    z-index: 10;
}
</style>
</head>

<body>

<h1>Hi, I'm Srushti 👋</h1>
<p>Lost in space building cool things 🚀</p>

<div class="box">About Me</div>
<div class="box">Skills</div>
<div class="box">Projects</div>
<div class="box">Contact</div>

<script>

// ⭐ STARS
for (let i = 0; i < 200; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * window.innerHeight + "px";
    star.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(star);
}

// 👽🛸 OBJECTS
const emojis = ["👽","🛸","👾","✨"];
let movers = [];

for (let i = 0; i < 8; i++) {

    let el = document.createElement("div");
    el.className = "mover";
    el.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

    // RANDOM START POSITION
    let x = Math.random() * window.innerWidth;
    let y = Math.random() * window.innerHeight;

    // RANDOM DIRECTION (FULL RANGE)
    let angle = Math.random() * 2 * Math.PI;
    let speed = Math.random() * 3 + 1;

    let obj = {
        el: el,
        x: x,
        y: y,
        dx: Math.cos(angle) * speed,
        dy: Math.sin(angle) * speed
    };

    el.style.left = x + "px";
    el.style.top = y + "px";

    document.body.appendChild(el);
    movers.push(obj);
}

// 🧠 TRUE RANDOM MOTION LOOP
function animate() {
    movers.forEach(obj => {

        obj.x += obj.dx;
        obj.y += obj.dy;

        // bounce edges
        if (obj.x <= 0 || obj.x >= window.innerWidth - 40) {
            obj.dx *= -1;
        }
        if (obj.y <= 0 || obj.y >= window.innerHeight - 40) {
            obj.dy *= -1;
        }

        // RANDOM CHAOS SHIFT (THIS IS THE MAGIC)
        if (Math.random() < 0.02) {
            let angle = Math.random() * 2 * Math.PI;
            let speed = Math.random() * 3 + 1;
            obj.dx = Math.cos(angle) * speed;
            obj.dy = Math.sin(angle) * speed;
        }

        obj.el.style.left = obj.x + "px";
        obj.el.style.top = obj.y + "px";
    });

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
